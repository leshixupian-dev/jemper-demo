<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>君佩珠宝 · AI导购顾问</title>
  <style>
    :root {
      /* ── 棕金配色体系（参照君佩官网暖棕调） ── */
      --bg-primary:   #1C0F06;
      --bg-secondary: #251508;
      --bg-card:      #2E1C0C;
      --bg-card-hover:#3C2410;
      --gold-primary: #C9A84C;
      --gold-light:   #E8D5A3;
      --gold-dark:    #8A6A20;
      --gold-bright:  #F0C84A;
      --gold-dim:     #7A5C18;
      --border-gold:       rgba(201,168,76,.22);
      --border-gold-mid:   rgba(201,168,76,.42);
      --border-gold-bright:rgba(201,168,76,.68);
      --text-primary:  #F5EDD8;
      --text-secondary:#A08A64;
      --text-muted:    #6A5030;
      --sidebar-w: 360px;
      --header-h:  62px;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
      background: #1C0F06;
      /* 仿君佩官网：左侧暖琥珀光晕 + 右上角微光 */
      background-image:
        radial-gradient(ellipse 55% 75% at 12% 58%, rgba(160,80,14,.38) 0%, transparent 60%),
        radial-gradient(ellipse 35% 45% at 88% 18%, rgba(110,58,10,.22) 0%, transparent 50%),
        radial-gradient(ellipse 60% 60% at 50% 100%, rgba(90,45,8,.2) 0%, transparent 55%);
      color:var(--text-primary);
      height:100vh; overflow:hidden; display:flex; flex-direction:column;
    }

    /* ═══ HEADER ═══ */
    .header{
      height:var(--header-h);
      background:linear-gradient(135deg,#120A04,#1E1008);
      border-bottom:1px solid var(--border-gold);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 28px; flex-shrink:0; position:relative;
    }
    .header::after{
      content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold-primary) 40%,var(--gold-bright) 60%,transparent);
      opacity:.6;
    }
    .brand{ display:flex; align-items:center; gap:14px; }
    .brand-emblem{
      width:38px; height:38px;
      background:linear-gradient(145deg,var(--gold-dim),var(--gold-primary));
      border-radius:50%; border:1px solid var(--border-gold-bright);
      display:flex; align-items:center; justify-content:center; font-size:20px;
      box-shadow:0 0 12px rgba(201,168,76,.3);
    }
    .brand-name{
      font-size:19px; font-weight:700; letter-spacing:4px;
      background:linear-gradient(135deg,var(--gold-dark),var(--gold-primary) 40%,var(--gold-bright) 70%,var(--gold-light));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .brand-sub{ font-size:10px; letter-spacing:3px; color:var(--text-muted); margin-top:2px; }
    .online-badge{
      display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary);
      border:1px solid var(--border-gold); padding:4px 12px; border-radius:20px;
      background:rgba(201,168,76,.05);
    }
    .online-dot{
      width:7px; height:7px; border-radius:50%; background:#52D98A;
      box-shadow:0 0 6px rgba(82,217,138,.6); animation:glow 2s infinite;
    }
    @keyframes glow{ 0%,100%{opacity:1;box-shadow:0 0 6px rgba(82,217,138,.6)} 50%{opacity:.5;box-shadow:0 0 2px rgba(82,217,138,.3)} }

    /* ═══ LAYOUT ═══ */
    .layout{ display:flex; flex:1; overflow:hidden; }

    /* ═══ CHAT ═══ */
    .chat-area{ flex:1; display:flex; flex-direction:column; border-right:1px solid var(--border-gold); position:relative; }

    /* 聊天区背景装饰图层 */
    #chatDeco{
      position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden;
      /* 四周渐变羽化遮罩，让图片边缘自然消融 */
      -webkit-mask-image:
        radial-gradient(ellipse 70% 65% at 50% 50%,
          rgba(0,0,0,1) 30%,
          rgba(0,0,0,0.6) 55%,
          rgba(0,0,0,0) 80%
        );
      mask-image:
        radial-gradient(ellipse 70% 65% at 50% 50%,
          rgba(0,0,0,1) 30%,
          rgba(0,0,0,0.6) 55%,
          rgba(0,0,0,0) 80%
        );
    }

    /* 貔貅主图：透明底PNG，居中水印 */
    #chatDeco .deco-main{
      position:absolute;
      width:700px; height:700px;
      top:50%; left:50%;
      transform:translate(-50%, -50%);
      object-fit:contain;
      opacity:0.12;
      filter:
        sepia(0.2)
        saturate(1.2)
        brightness(0.95);
    }

    .chat-messages{
      flex:1; overflow-y:auto; padding:28px 28px 16px;
      display:flex; flex-direction:column; gap:20px; scroll-behavior:smooth;
      position:relative; z-index:1;
    }
    .chat-messages::-webkit-scrollbar{ width:3px; }
    .chat-messages::-webkit-scrollbar-thumb{ background:var(--gold-dim); border-radius:2px; }

    /* messages */
    .msg{ display:flex; gap:12px; animation:slideUp .35s ease; }
    .msg.user{ flex-direction:row-reverse; }
    @keyframes slideUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .msg-avatar{
      width:34px; height:34px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:15px;
    }
    .av-ai{ background:linear-gradient(145deg,var(--gold-dim),var(--gold-primary)); border:1px solid var(--border-gold-bright); box-shadow:0 0 10px rgba(201,168,76,.2); }
    .av-user{ background:#201A10; border:1px solid rgba(255,255,255,.08); }
    .msg-body{ max-width:62%; }
    .msg-sender{ font-size:11px; color:var(--text-muted); margin-bottom:5px; letter-spacing:.5px; }
    .msg.user .msg-sender{ text-align:right; }
    .bubble{ padding:13px 17px; border-radius:14px; font-size:14px; line-height:1.75; }
    .bubble-ai{ background:var(--bg-card); border:1px solid var(--border-gold); border-radius:4px 14px 14px 14px; }
    .bubble-user{ background:linear-gradient(135deg,#251C09,#35280F); border:1px solid var(--border-gold-mid); border-radius:14px 4px 14px 14px; }
    .hl{ color:var(--gold-primary); font-weight:500; }
    .hl-b{ color:var(--gold-bright); font-weight:600; }

    /* quick replies */
    .qr-group{ display:flex; flex-wrap:wrap; gap:8px; margin-top:13px; }
    .qr-btn{
      padding:7px 18px; font-size:13px; font-family:inherit;
      background:rgba(201,168,76,.06); border:1px solid var(--border-gold-mid);
      color:var(--gold-light); border-radius:22px; cursor:pointer; transition:all .2s;
    }
    .qr-btn:hover{ background:rgba(201,168,76,.18); border-color:var(--gold-primary); color:var(--gold-bright); }
    .qr-btn:disabled{ opacity:.28; cursor:not-allowed; pointer-events:none; }

    /* typing */
    .typing-wrap{
      display:flex; gap:5px; align-items:center; padding:13px 18px; width:fit-content;
      background:var(--bg-card); border:1px solid var(--border-gold); border-radius:4px 14px 14px 14px;
    }
    .t-dot{ width:6px; height:6px; border-radius:50%; background:var(--gold-primary); animation:bounce 1.3s infinite; }
    .t-dot:nth-child(2){ animation-delay:.18s; }
    .t-dot:nth-child(3){ animation-delay:.36s; }
    @keyframes bounce{ 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-7px);opacity:1} }

    /* input */
    .input-zone{ padding:14px 24px 20px; border-top:1px solid var(--border-gold); background:linear-gradient(0deg,#1C0F06 0%,rgba(28,15,6,.85) 60%,transparent); }
    .input-row{
      display:flex; gap:10px; align-items:center;
      background:var(--bg-card); border:1px solid var(--border-gold);
      border-radius:12px; padding:9px 14px; transition:border-color .2s;
    }
    .input-row:focus-within{ border-color:var(--gold-primary); }
    .chat-input{ flex:1; background:transparent; border:none; outline:none; font-size:14px; font-family:inherit; color:var(--text-primary); }
    .chat-input::placeholder{ color:var(--text-muted); }
    .send-btn{
      width:34px; height:34px; flex-shrink:0;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold-primary));
      border:none; border-radius:9px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      color:#080604; font-size:15px; transition:all .2s;
    }
    .send-btn:hover{ background:linear-gradient(135deg,var(--gold-primary),var(--gold-bright)); transform:scale(1.06); }

    /* divider */
    .chat-divider{ display:flex; align-items:center; gap:10px; margin:4px 0; }
    .chat-divider span{ font-size:11px; color:var(--text-muted); white-space:nowrap; }
    .chat-divider::before,.chat-divider::after{ content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--border-gold)); }
    .chat-divider::after{ background:linear-gradient(270deg,transparent,var(--border-gold)); }

    /* ═══ SIDEBAR ═══ */
    .sidebar{ width:var(--sidebar-w); flex-shrink:0; display:flex; flex-direction:column; background:var(--bg-secondary); overflow:hidden; }
    .sidebar-head{
      padding:15px 18px; border-bottom:1px solid var(--border-gold);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .sidebar-title{ font-size:12px; font-weight:500; letter-spacing:2px; color:var(--gold-light); }
    .sidebar-count{ font-size:11px; color:var(--text-muted); }
    /* ── 修复 flex 子元素溢出不滚动的问题 ── */
    .product-list{ flex:1; min-height:0; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:11px; }
    .product-list::-webkit-scrollbar{ width:4px; }
    .product-list::-webkit-scrollbar-track{ background:rgba(201,168,76,.04); }
    .product-list::-webkit-scrollbar-thumb{ background:var(--gold-dim); border-radius:2px; }

    /* empty */
    .empty-state{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-muted); text-align:center; gap:14px; padding:40px; }
    .empty-icon{ font-size:52px; opacity:.4; }
    .empty-text{ font-size:13px; line-height:1.7; }

    /* ═══ PRODUCT CARD ═══ */
    /* ═══ 横版产品卡片 ═══ */
    .p-card{
      display:flex; height:185px; flex-shrink:0;
      background:var(--bg-card); border:1px solid var(--border-gold);
      border-radius:12px; overflow:hidden; cursor:pointer;
      transition:all .3s ease; animation:slideIn .4s ease both; position:relative;
    }
    .p-card:hover{ background:var(--bg-card-hover); border-color:var(--gold-primary); box-shadow:0 8px 24px rgba(201,168,76,.14); }
    @keyframes slideIn{ from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }

    /* 左侧文字区 */
    .p-left{
      flex:1; min-width:0; padding:14px 0 13px 15px;
      display:flex; flex-direction:column; gap:5px; position:relative; z-index:1;
    }
    /* 文字区右侧渐变，平滑融入图片 */
    .p-left::after{
      content:''; position:absolute; right:0; top:0; bottom:0; width:28px;
      background:linear-gradient(90deg,transparent,var(--bg-card)); pointer-events:none;
    }
    .p-card:hover .p-left::after{ background:linear-gradient(90deg,transparent,var(--bg-card-hover)); }

    .p-series{ font-size:10px; color:var(--gold-primary); letter-spacing:1.5px; }
    .p-name{
      font-size:13px; font-weight:500; color:var(--text-primary);
      line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .p-price{
      font-size:17px; font-weight:700;
      background:linear-gradient(135deg,var(--gold-primary),var(--gold-bright));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .p-tags{ display:flex; flex-wrap:wrap; gap:4px; }
    .p-tag{ padding:2px 7px; border-radius:10px; font-size:9px; color:var(--gold-primary); background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.18); }

    .p-meta-row{ display:flex; align-items:center; gap:6px; margin-top:auto; }
    .p-rating{ font-size:11px; color:var(--gold-primary); display:flex; align-items:center; gap:3px; }
    .p-reviews{ font-size:10px; color:var(--text-muted); }
    .p-stock-dot{ font-size:10px; color:#52D98A; display:flex; align-items:center; gap:3px; margin-left:8px; }
    .p-stock-dot::before{ content:'●'; font-size:7px; }

    .p-actions{ display:flex; gap:7px; margin-top:6px; padding-right:28px; }
    .btn-cart{
      flex:1; padding:7px 0; font-size:11px; font-family:inherit; font-weight:600;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold-primary));
      border:none; border-radius:7px; color:#080604; cursor:pointer; transition:all .2s;
    }
    .btn-cart:hover{ background:linear-gradient(135deg,var(--gold-primary),var(--gold-bright)); }
    .btn-detail{
      padding:7px 11px; font-size:11px; font-family:inherit; background:transparent;
      border:1px solid var(--border-gold-mid); border-radius:7px; color:var(--gold-light); cursor:pointer; transition:all .2s;
      white-space:nowrap;
    }
    .btn-detail:hover{ background:rgba(201,168,76,.12); border-color:var(--gold-primary); }

    /* 右侧图片区 */
    .p-right{
      width:130px; flex-shrink:0; position:relative; overflow:hidden; background:#221208;
    }
    .p-right img{ width:100%; height:100%; object-fit:contain; object-position:center; display:block; }
    /* 图片左侧黑色渐变，融入文字区 */
    .p-right::before{
      content:''; position:absolute; left:0; top:0; bottom:0; width:32px; z-index:2;
      background:linear-gradient(90deg,var(--bg-card),transparent); pointer-events:none;
    }
    .p-card:hover .p-right::before{ background:linear-gradient(90deg,var(--bg-card-hover),transparent); }

    .p-badge{
      position:absolute; top:8px; right:8px; z-index:3;
      padding:2px 8px; border-radius:10px; font-size:9px; font-weight:700;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold-primary));
      color:#080604; box-shadow:0 2px 6px rgba(201,168,76,.4);
    }

    /* ═══ DETAIL MODAL ═══ */
    .modal-overlay{
      position:fixed; inset:0; z-index:1000;
      background:rgba(4,3,2,.9); backdrop-filter:blur(6px);
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    .modal-overlay.open{ display:flex; animation:fadeIn .3s ease; }
    @keyframes fadeIn{ from{opacity:0} to{opacity:1} }

    .modal-box{
      background:var(--bg-card);
      border:1px solid var(--border-gold-mid);
      border-radius:18px; width:100%; max-width:880px;
      max-height:88vh; overflow:hidden; position:relative;
      box-shadow:0 24px 64px rgba(0,0,0,.7), 0 0 48px rgba(201,168,76,.08);
      animation:modalUp .35s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes modalUp{ from{opacity:0;transform:translateY(24px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }

    .modal-close{
      position:absolute; top:16px; right:16px; z-index:20;
      width:32px; height:32px; border-radius:50%;
      background:rgba(0,0,0,.55); border:1px solid var(--border-gold-mid);
      color:var(--gold-light); cursor:pointer; font-size:14px;
      display:flex; align-items:center; justify-content:center; transition:all .2s;
    }
    .modal-close:hover{ background:rgba(201,168,76,.25); color:var(--gold-bright); }

    .modal-inner{ display:flex; height:100%; max-height:88vh; }

    /* left image */
    .modal-img-panel{
      width:42%; flex-shrink:0; background:#1E1008;
      position:relative; display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .modal-img-panel img{ width:100%; height:100%; object-fit:contain; }
    .modal-img-badge{
      position:absolute; top:16px; left:16px;
      padding:5px 12px; border-radius:14px; font-size:11px; font-weight:700;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold-primary));
      color:#080604; letter-spacing:.5px;
      box-shadow:0 4px 12px rgba(201,168,76,.35);
    }
    /* decorative corner line */
    .modal-img-panel::after{
      content:''; position:absolute; bottom:0; left:0; right:0; height:60px;
      background:linear-gradient(transparent,rgba(20,10,4,.8));
    }

    /* right info */
    .modal-info{
      flex:1; overflow-y:auto; padding:36px 32px 28px;
      display:flex; flex-direction:column; gap:0;
      scrollbar-width:thin; scrollbar-color:var(--gold-dim) transparent;
    }
    .modal-info::-webkit-scrollbar{ width:3px; }
    .modal-info::-webkit-scrollbar-thumb{ background:var(--gold-dim); border-radius:2px; }

    .modal-series-badge{
      display:inline-block; padding:3px 12px; border-radius:14px;
      font-size:10px; letter-spacing:2px; color:var(--gold-primary);
      border:1px solid rgba(201,168,76,.35); background:rgba(201,168,76,.07);
      margin-bottom:14px;
    }
    .modal-name{
      font-size:22px; font-weight:700; line-height:1.3; margin-bottom:12px;
      background:linear-gradient(135deg,var(--gold-dark),var(--gold-primary) 40%,var(--gold-bright));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .modal-price-row{ display:flex; align-items:baseline; gap:12px; margin-bottom:16px; }
    .modal-price{
      font-size:30px; font-weight:800;
      background:linear-gradient(135deg,var(--gold-primary),var(--gold-bright));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .modal-orig{ font-size:14px; color:var(--text-muted); text-decoration:line-through; }

    .modal-rule{
      height:1px; margin-bottom:20px;
      background:linear-gradient(90deg,var(--gold-primary),rgba(201,168,76,.1));
    }

    /* recommendation block */
    .modal-rec{
      background:rgba(201,168,76,.06); border:1px solid var(--border-gold);
      border-left:3px solid var(--gold-primary);
      border-radius:0 12px 12px 0; padding:16px 18px; margin-bottom:20px;
    }
    .modal-rec-label{
      font-size:10px; color:var(--gold-primary); font-weight:600;
      letter-spacing:2px; margin-bottom:10px; display:flex; align-items:center; gap:6px;
    }
    .modal-rec-label::before{ content:''; width:12px; height:1px; background:var(--gold-primary); }
    .modal-rec-text{ font-size:13px; color:var(--text-secondary); line-height:1.85; }

    /* tags */
    .modal-tags{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:20px; }
    .modal-tag{
      padding:5px 14px; border-radius:18px; font-size:12px; color:var(--gold-primary);
      background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.25);
    }

    /* specs grid */
    .modal-specs{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
    .spec-card{
      background:rgba(255,255,255,.025); border:1px solid rgba(255,255,255,.07);
      border-radius:10px; padding:12px 14px;
    }
    .spec-label{ font-size:10px; color:var(--text-muted); letter-spacing:1.5px; margin-bottom:6px; }
    .spec-val{ font-size:12px; color:var(--text-secondary); line-height:1.6; }
    .spec-val.full{ grid-column:1/-1; }

    /* rating row */
    .modal-rating-row{
      display:flex; align-items:center; gap:14px; margin-bottom:24px;
      padding:12px 14px; background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.05); border-radius:10px;
    }
    .mr-stars{ color:var(--gold-primary); font-size:14px; letter-spacing:2px; }
    .mr-score{ font-size:16px; font-weight:700; color:var(--gold-primary); }
    .mr-count{ font-size:12px; color:var(--text-muted); }
    .mr-stock{ margin-left:auto; font-size:12px; color:#52D98A; display:flex; align-items:center; gap:5px; }
    .mr-stock::before{ content:'●'; font-size:8px; }

    /* CTA */
    .modal-cta{ display:flex; gap:10px; }
    .cta-cart{
      flex:3; padding:13px; font-family:inherit; font-size:14px; font-weight:700; letter-spacing:.5px;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold-primary));
      border:none; border-radius:10px; color:#080604; cursor:pointer; transition:all .2s;
    }
    .cta-cart:hover{ background:linear-gradient(135deg,var(--gold-primary),var(--gold-bright)); }
    .cta-appt{
      flex:2; padding:13px; font-family:inherit; font-size:13px;
      background:transparent; border:1px solid var(--border-gold-mid);
      border-radius:10px; color:var(--gold-light); cursor:pointer; transition:all .2s;
    }
    .cta-appt:hover{ background:rgba(201,168,76,.1); border-color:var(--gold-primary); }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <div class="brand">
    <div class="brand-emblem">💎</div>
    <div>
      <div class="brand-name">君 佩</div>
      <div class="brand-sub">JEMPER · FINE JEWELRY</div>
    </div>
  </div>
  <div class="online-badge"><div class="online-dot"></div><span>专属顾问在线</span></div>
</header>

<!-- ═══ BODY ═══ -->
<div class="layout">

  <!-- Chat -->
  <div class="chat-area">

const S = {
  step: 'greeting',
  occasion: null, budget: null, recipient: null,
  shownIds: [],
};

/* ════════════════════════════════
   FILTERING
════════════════════════════════ */
const OCCASION_MAP = {
  '💍 婚庆 / 求婚':   ['wedding','formal','anniversary'],
  '🎂 生日 / 纪念日': ['gift','daily','anniversary'],
  '🎁 送礼 / 日常':   ['gift','daily'],
  '💼 投资 / 收藏':   ['collection'],
};
const BUDGET_MAP = {
  '3万以内': ['mid-high'],
  '3–5万':   ['high'],
  '5–10万':  ['high-luxury'],
  '10万以上':['luxury'],
};
const RECIPIENT_MAP = {
  '💑 给另一半':   ['spouse'],
  '🌸 送父母长辈': ['parent'],
  '👯 送朋友闺蜜': ['friend'],
  '🪞 给自己':     ['self'],
};

function filterProducts() {
  let pool = [...PRODUCTS];
  if (S.occasion) {
    const cats = OCCASION_MAP[S.occasion]||[];
    const f = pool.filter(p=>p.cats.some(c=>cats.includes(c)));
    if (f.length) pool = f;
  }
  if (S.budget) {
    const bs = BUDGET_MAP[S.budget]||[];
    const f = pool.filter(p=>p.budgets.some(b=>bs.includes(b)));
    if (f.length) pool = f;
  }
  if (S.recipient) {
    const rs = RECIPIENT_MAP[S.recipient]||[];
    const f = pool.filter(p=>p.recipients.some(r=>rs.includes(r)));
    if (f.length) pool = f;
  }
  const fresh = pool.filter(p=>!S.shownIds.includes(p.id));
  return (fresh.length ? fresh : pool).slice(0,3);
}

   CHAT RENDERING
════════════════════════════════ */
function addMsg(html, isUser=false, replies=null) {
  const wrap = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = `msg ${isUser?'user':''}`;
  const qr = replies
    ? `<div class="qr-group">${replies.map(r=>`<button class="qr-btn" onclick="onQR(this,'${r.replace(/'/g,"\\'")}')">${r}</button>`).join('')}</div>`
    : '';
  el.innerHTML = `
    <div class="msg-avatar ${isUser?'av-user':'av-ai'}">${isUser?'🙋':'💎'}</div>
    <div class="msg-body">
      <div class="msg-sender">${isUser?'您':'小佩顾问'}</div>
      <div class="bubble ${isUser?'bubble-user':'bubble-ai'}">${html}</div>
      ${qr}
    </div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function addDivider(txt) {
  const wrap = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'chat-divider';
  el.innerHTML = `<span>${txt}</span>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'msg'; el.id = 'typing';
  el.innerHTML = `
    <div class="msg-avatar av-ai">💎</div>
    <div class="msg-body">
      <div class="msg-sender">小佩顾问</div>
      <div class="typing-wrap"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>
    </div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}
function hideTyping() { const e = document.getElementById('typing'); if(e) e.remove(); }

function aiSay(html, replies=null, delay=950) {
  return new Promise(res => {
    showTyping();
    setTimeout(() => { hideTyping(); addMsg(html,false,replies); res(); }, delay + Math.random()*400);
  });
}
function disableQR() { document.querySelectorAll('.qr-btn').forEach(b=>b.disabled=true); }

        </div>
        <div class="p-actions" onclick="event.stopPropagation()">
          <button class="btn-cart" onclick="onCart('${p.name.replace(/'/g,"\\'")}')">加购</button>
          <button class="btn-detail" onclick="openDetail(${p.id})">查看详情</button>
        </div>
      </div>
      <!-- 右：图片 -->
      <div class="p-right">
        <img src="${p.img}" alt="${p.name}" loading="lazy" />
        ${badge}
      </div>
    </div>`;
  }).join('');
  S.shownIds = [...S.shownIds, ...list.map(p=>p.id)];
  countEl.textContent = `${list.length} 件推荐`;
}

/* ════════════════════════════════
   DETAIL MODAL
════════════════════════════════ */
function openDetail(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  if (!p) return;

  document.getElementById('mImg').src = p.img;
  document.getElementById('mImg').alt = p.name;

  const badge = document.getElementById('mBadge');
  if (p.badge) { badge.textContent = p.badge; badge.style.display = 'block'; }
  else { badge.style.display = 'none'; }

  document.getElementById('mSeries').textContent = p.series;
  document.getElementById('mName').textContent   = p.name;
  document.getElementById('mPrice').textContent  = p.price;
  const orig = document.getElementById('mOrig');
  orig.textContent = p.origPrice || '';

  document.getElementById('mReason').textContent = p.reason;

  document.getElementById('mTags').innerHTML =
    p.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');

  document.getElementById('mSpecs').innerHTML = `
    <div class="spec-card">
      <div class="spec-label">材质工艺</div>
      <div class="spec-val">${p.material}</div>
    </div>
    <div class="spec-card">
      <div class="spec-label">库存状态</div>
      <div class="spec-val" style="color:#52D98A">${p.stock}</div>
    </div>
    <div class="spec-card">
      <div class="spec-label">适合人群</div>
      <div class="spec-val">${p.audience}</div>
    </div>
    <div class="spec-card">
      <div class="spec-label">推荐场合</div>
      <div class="spec-val">${p.occasions}</div>
    </div>`;

  const stars = '★'.repeat(Math.floor(p.rating)) + (p.rating%1>=.5?'☆':'');
  document.getElementById('mRating').innerHTML = `
    <span class="mr-stars">${stars}</span>
    <span class="mr-score">${p.rating}</span>
    <span class="mr-count">${p.reviews} 人评价</span>
    <span class="mr-stock">${p.stock}</span>`;

  document.getElementById('mCartBtn').onclick = () => {
    closeModal();
    onCart(p.name);
  };

  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
  document.body.style.overflow = '';
}

function overlayClick(e) {
  if (e.target === document.getElementById('detailModal')) closeModal();
}

function apptMsg() {
  closeModal();
  addMsg('好的，我来为您安排到店预约 ✦<br>请问您方便的<span class="hl">到店城市</span>与<span class="hl">时间段</span>是？', false, ['上海','北京','广州深圳','其他城市']);
}

/* ════════════════════════════════
   CONVERSATION LOGIC
════════════════════════════════ */
async function boot() {
  await aiSay(
    `您好，我是<span class="hl">君佩珠宝</span>专属顾问 <span class="hl-b">小佩</span> 💎<br><br>
    很高兴为您服务。请问今天您是<span class="hl">有特定购买需求</span>，还是想先<span class="hl">浏览一下精选推荐</span>？`,
    ['我有明确需求 →','先随便逛逛 ✦'], 800
  );
}

async function onQR(btn, val) {
  disableQR(); addMsg(val,true); await handleReply(val);
}

async function handleReply(val) {
  if (S.step==='greeting') {
    if (val.includes('明确需求')) {
      S.step='ask_occasion';
      await aiSay(`好的，我来为您进行<span class="hl">个性化推荐</span> ✦ 只需回答几个小问题。<br><br>首先，请问这次购买的主要<span class="hl">场合</span>是？`,
        ['💍 婚庆 / 求婚','🎂 生日 / 纪念日','🎁 送礼 / 日常','💼 投资 / 收藏']);
    } else {
      S.step='browsing';
      await aiSay(`当然，以下是我们近期<span class="hl">热销精选</span>，每件均附顾问推荐理由 ✦<br><br>如有不心仪的，直接说"<span class="hl">换一批</span>"即可。`,
        ['换一批推荐 ↻','我有明确需求 →']);
      renderProducts(PRODUCTS.slice(0,3));
    }
    return;
  }
  if (S.step==='ask_occasion') {
    S.occasion=val; S.step='ask_budget';
    await aiSay(`了解 ✦ 请问您的<span class="hl">预算范围</span>大概在？`,
      ['3万以内','3–5万','5–10万','10万以上']);
    return;
  }
  if (S.step==='ask_budget') {
    S.budget=val; S.step='ask_recipient';
    await aiSay(`好的。这件珠宝主要<span class="hl">送给谁</span>？`,
      ['💑 给另一半','🌸 送父母长辈','👯 送朋友闺蜜','🪞 给自己']);
    return;
  }
  if (S.step==='ask_recipient') {
    S.recipient=val; S.step='results';
    const list = filterProducts();
    const occasionTxt = val.replace(/[^\u4e00-\u9fa5\/\s]/g,'').trim();
    addDivider('✦ 以下是为您量身推荐的作品');
    await aiSay(
      `根据您的需求，我为您精选了 <span class="hl-b">${list.length}</span> 件最合适的作品 ✦<br><br>
      点击右侧卡片中的<span class="hl">「详情」</span>可查看完整产品介绍。如不满意，随时说"<span class="hl">换一批</span>"。`,
      ['不太喜欢，换一批 ↻','重新选择需求 ⟳','想了解更多 →']
    );
    renderProducts(list.length ? list : PRODUCTS.slice(0,3));
    return;
  }
  if (S.step==='results'||S.step==='browsing') {
    if (val.includes('换一批')||val.includes('不太喜欢')) {
      const list = filterProducts();
      if (!list.length) {
        await aiSay(`该条件下已没有更多推荐了 😔<br>建议<span class="hl">调整预算或场合</span>，我重新为您筛选。`, ['重新选择需求 ⟳']);
      } else {
        await aiSay(`好的，为您换一批精选 ✦`, ['继续换一批 ↻','重新选择需求 ⟳']);
        renderProducts(list);
      }
      return;
    }
    if (val.includes('重新选择')) {
      Object.assign(S,{step:'ask_occasion',occasion:null,budget:null,recipient:null,shownIds:[]});
      addDivider('重新开始');
      await aiSay(`好的，我们重新来过 ✦<br>请问这次购买的主要<span class="hl">场合</span>是？`,
        ['💍 婚庆 / 求婚','🎂 生日 / 纪念日','🎁 送礼 / 日常','💼 投资 / 收藏']);
      return;
    }
    if (val.includes('了解更多')) {
      await aiSay(
        `您想深入了解哪个方向？<br>
        <span class="hl">材质工艺</span>、<span class="hl">尺寸定制</span>、<span class="hl">售后保障</span>，
        或是某件单品的具体详情，都可以直接问我。`,
        ['材质与工艺 ◆','尺寸与定制 ✦','售后保障 ◉']
      );
      return;
    }
    if (val.includes('材质')) {
      await aiSay(`君佩所有黄金产品均采用<span class="hl">足金999</span>或<span class="hl">18K黄金</span>，附国家检测机构鉴定证书；<br>
        钻石产品均附<span class="hl">GIA国际证书</span>；宝石类采用<span class="hl">天然宝石</span>，附权威鉴定报告。`,
        ['尺寸与定制 ✦','售后保障 ◉','返回推荐 →']);
      return;
    }
    if (val.includes('尺寸')) {
      await aiSay(`所有戒指、手镯均可免费提供<span class="hl">尺寸调整</span>服务；<br>
        部分系列支持<span class="hl">刻字定制</span>，交期约 3–5 个工作日；<br>
        如需定制，我可为您安排门店顾问跟进。`,
        ['售后保障 ◉','返回推荐 →']);
      return;
    }
    if (val.includes('售后')) {
      await aiSay(`君佩提供<span class="hl">终身免费清洗抛光</span>服务；<br>
        黄金产品享受<span class="hl">保价回购</span>政策；<br>
        购买后 7 天内支持无理由退换，非人为损坏享<span class="hl">1 年免费维修</span>。`,
        ['返回推荐 →']);
      return;
    }
    if (val.includes('返回推荐')||val.includes('明确需求')) {
      Object.assign(S,{step:'ask_occasion',occasion:null,budget:null,recipient:null,shownIds:[]});
      await aiSay(`好的，请问这次购买的主要<span class="hl">场合</span>是？`,
        ['💍 婚庆 / 求婚','🎂 生日 / 纪念日','🎁 送礼 / 日常','💼 投资 / 收藏']);
      return;
    }
  }
  // fallback
  await aiSay(`感谢您的问题 ✦ 如需我进一步介绍，欢迎继续提问。`,
    ['重新推荐 →','换一批 ↻']);
}

/* ════════════════════════════════
   FREE INPUT HANDLER
════════════════════════════════ */
async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  disableQR();
  addMsg(text, true);
  showTyping();
  await new Promise(r => setTimeout(r, 750 + Math.random()*400));
  hideTyping();

  const t = text;

  if (/不喜欢|换[一批个]|其他|别的/.test(t)) {
    const list = filterProducts();
    if (!list.length) {
      addMsg(`已没有更多符合条件的推荐了 😔<br>可<span class="hl">调整需求</span>后重新筛选。`, false, ['重新选择需求 ⟳']);
    } else {
      addMsg(`马上为您换一批 ✦`, false, ['继续换一批 ↻','重新选择需求 ⟳']);
      renderProducts(list);
    }
  } else if (/黄金|gold/i.test(t)) {
    const list = PRODUCTS.filter(p=>p.material.includes('足金')).slice(0,3);
    addMsg(`为您筛选出<span class="hl">足金系列</span>单品 ✦ 克重足、品质有保障。`, false, ['换一批 ↻','重新选择需求 ⟳']);
    renderProducts(list);
  } else if (/钻石|铂金|diamond/i.test(t)) {
    const list = PRODUCTS.filter(p=>p.material.includes('钻')).slice(0,3);
    addMsg(`为您筛选出<span class="hl">钻石镶嵌系列</span>，每件均附国际鉴定证书 ✦`, false, ['换一批 ↻','重新选择需求 ⟳']);
    renderProducts(list);
  } else if (/红宝石|ruby/i.test(t)) {
    const list = PRODUCTS.filter(p=>p.tags.join('').includes('红宝石')||p.name.includes('红宝石')).slice(0,3);
    addMsg(`为您筛选出<span class="hl">天然红宝石</span>系列单品 ✦ 热情浓郁，寓意吉祥。`, false, ['换一批 ↻','重新选择需求 ⟳']);
    renderProducts(list);
  } else if (/收藏|投资|保值/.test(t)) {
    const list = PRODUCTS.filter(p=>p.cats.includes('collection')).slice(0,3);
    addMsg(`为您筛选出<span class="hl">收藏投资系列</span> ✦ 兼具美观与长期保值价值。`, false, ['换一批 ↻','重新选择需求 ⟳']);
    renderProducts(list);
  } else if (/预算|价格|多少钱|贵/.test(t)) {
    addMsg(`我们的产品价格区间从 <span class="hl">¥25,000</span> 到 <span class="hl">¥130,000+</span>，覆盖多层次需求。<br>
      请告诉我您的预算，我来精准筛选 ✦`,
      ['3万以内','3–5万','5–10万','10万以上']);
    if (S.step==='greeting'||S.step==='browsing') S.step='ask_budget';
  } else if (/婚|求婚|订婚/.test(t)) {
    S.occasion='💍 婚庆 / 求婚'; S.step='ask_budget';
    addMsg(`了解，您在为<span class="hl">婚庆 / 求婚</span>挑选 ✦ 请问预算范围大概是？`,
      false, ['3万以内','3–5万','5–10万','10万以上']);
  } else if (/生日|纪念/.test(t)) {
    S.occasion='🎂 生日 / 纪念日'; S.step='ask_budget';
    addMsg(`了解，为<span class="hl">生日 / 纪念日</span>挑选 ✦ 请问预算大概是？`,
      false, ['3万以内','3–5万','5–10万','10万以上']);
  } else if (/谢谢|感谢|很好|不错|满意/.test(t)) {
    addMsg(`不客气，这是我的荣幸 ✦<br>随时欢迎回来，祝您找到心仪的那件珍品 💎`);
  } else {
    addMsg(`我明白您的意思 ✦<br>您可以继续描述需求，或点击快捷按钮开始推荐。`,
      false, ['开始个性推荐 →','浏览精选 ✦']);
  }
}

/* ════════════════════════════════
   CART / INTERACT
════════════════════════════════ */
function onCart(name) {
  addMsg(`已为您将<span class="hl">「${name}」</span>加入购物车 ✦<br>如需了解尺寸定制或礼品包装，随时告知。`, false);
  document.getElementById('chatMessages').scrollTop = 99999;
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key==='Enter') sendMsg();
});

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
});

boot();
</script>
</body>
</html>
